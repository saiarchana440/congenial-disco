<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Weather — Warm Phone UI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --accent:#ff8a00;
      --accent-2:#ffd07a;
      --phone-bg:#ffffff;
      --glass: rgba(255,255,255,0.85);
      --muted:#6b5a4a;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;}
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:36px;
      background:linear-gradient(180deg,#fdeedf 0%, #f5f2ee 60%);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#222;
    }

    /* Center phone mock */
    .phone {
      width:360px;
      max-width:92vw;
      aspect-ratio: 9/19;
      background: linear-gradient(180deg, #fff, #f8f6f5);
      border-radius:34px;
      padding:12px;
      box-shadow: 0 22px 60px rgba(12,18,30,0.12), inset 0 2px 0 rgba(255,255,255,0.6);
      border: 10px solid rgba(0,0,0,0.02);
      position:relative;
      overflow:hidden;
    }

    /* inner screen area */
    .screen {
      width:100%;
      height:100%;
      border-radius:22px;
      overflow:hidden;
      background: linear-gradient(180deg, rgba(255,140,0,0.98) 0%, rgba(255,200,120,0.85) 50%, rgba(255,180,90,0.6) 100%);
      box-shadow: inset 0 -30px 60px rgba(255,140,0,0.07);
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:stretch;
    }

    /* top header */
    .header {
      padding:18px 18px 8px 18px;
      color: white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .header .left { font-weight:600; font-size:16px; opacity:0.95; }
    .header .right { display:flex; gap:10px; align-items:center; font-size:12px; opacity:0.95; }

    /* large temperature block */
    .big {
      padding:8px 22px 10px 22px;
      text-align:left;
      color: #fff;
      flex:0 0 auto;
    }
    .city {
      font-size:20px;
      font-weight:700;
      text-shadow: 0 6px 20px rgba(0,0,0,0.18);
      margin-bottom:6px;
      opacity:0.98;
    }
    .temp {
      font-size:72px;
      font-weight:300;
      line-height:0.9;
      display:flex;
      align-items:flex-start;
      gap:8px;
      text-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }
    .temp .deg { font-size:28px; margin-top:8px; font-weight:600; }

    .meta {
      font-size:14px;
      opacity:0.95;
      margin-top:8px;
    }

    /* decorative sun */
    .sun {
      position:absolute;
      right:28px;
      top:18px;
      width:92px;height:92px;
      border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #fff7d9 0%, rgba(255,255,255,0.35) 12%, rgba(255,255,255,0.06) 35%, transparent 100%);
      filter: blur(6px);
      mix-blend-mode:screen;
    }

    /* rounded content card */
    .card {
      background: white;
      margin:14px;
      border-radius:18px;
      box-shadow: 0 10px 30px rgba(20,30,40,0.08);
      padding:14px;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card .row {
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }

    .summary {
      display:flex;
      gap:12px;
      align-items:center;
    }
    .weather-thumb {
      width:64px;height:64px;border-radius:12px;background:linear-gradient(180deg,var(--accent) 0%, var(--accent-2) 100%);display:flex;align-items:center;justify-content:center;color:white;font-size:28px;box-shadow: 0 6px 18px rgba(255,130,0,0.25);
    }

    .summary .info { display:flex;flex-direction:column; gap:6px; }
    .summary .info .val { font-weight:700; color:#3b2a1b; }
    .summary .info .sub { font-size:12px; color:var(--muted); }

    /* small hourly tiles */
    .hours {
      display:flex;
      gap:8px;
      align-items:center;
      overflow:auto;
      padding-bottom:6px;
    }
    .hour {
      background:linear-gradient(180deg, #fff, #fff);
      min-width:62px;
      border-radius:10px;
      padding:8px;
      text-align:center;
      box-shadow: 0 4px 10px rgba(20,30,40,0.06);
      font-size:12px;
      color:#624b37;
    }
    .hour .time { font-weight:700; margin-bottom:6px; font-size:12px; }
    .hour .icon { font-size:16px; margin-bottom:6px; }
    .hour .t { font-weight:700; font-size:13px; }

    /* small action row */
    .actions { display:flex; gap:8px; align-items:center; justify-content:space-between; }
    .chip { background:#fff; padding:8px 12px; border-radius:999px; font-size:12px; color:#7a5a40; box-shadow: 0 6px 12px rgba(20,30,40,0.04); }

    /* sparkline chart area */
    .chart-wrap { padding:8px; background:linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.98)); border-radius:12px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }

    /* small footer icons */
    .footer { display:flex; gap:18px; justify-content:center; align-items:center; padding-bottom:8px; color: #b07a3a; }

    @media (max-width:420px){
      .temp{font-size:56px}
      .city{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="phone" aria-label="weather phone mockup">
    <div class="screen" role="application" aria-live="polite">
      <div class="sun" aria-hidden="true"></div>

      <div class="header">
        <div class="left">当前位置</div>
        <div class="right">
          <div class="small">Air 20m</div>
          <div class="small">UV 1m</div>
        </div>
      </div>

      <div class="big">
        <div class="city" id="cityName">—</div>
        <div class="temp" id="temp">—<span class="deg">°</span></div>
        <div class="meta" id="desc">—</div>
      </div>

      <div class="card" aria-label="details card">
        <div class="row summary">
          <div class="weather-thumb" id="thumb">☀️</div>
          <div class="info">
            <div class="val" id="hiLo">H: —  L: —</div>
            <div class="sub" id="note">Most of the day will be sunny.</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-weight:700;color:#d46a00" id="feel">Feels 27°</div>
            <div style="font-size:12px;color:var(--muted)">Wind 3 m/s</div>
          </div>
        </div>

        <div class="chart-wrap" aria-hidden="false">
          <!-- simple sparkline drawn by JS -->
          <svg id="spark" width="100%" height="90" viewBox="0 0 360 90" preserveAspectRatio="none"></svg>
        </div>

        <div style="margin-top:6px">
          <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Today</div>
          <div class="hours" id="hours">
            <!-- hourly tiles injected by JS -->
          </div>
        </div>

        <div class="actions" style="margin-top:8px">
          <div class="chip">Precip</div>
          <div class="chip">Humidity</div>
          <div class="chip">Sunrise</div>
        </div>

        <div class="footer" style="margin-top:8px">
          <div>🏠</div>
          <div>📍</div>
          <div>Graph</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // YOUR_API_KEY -> replace to enable live fetch; if left as placeholder this file uses demo data by default.
    const apiKey = "YOUR_API_KEY";

    // demo data that matches the warm orange screenshot look
    const demoData = {
      city: "Sacramento",
      temp: 26,
      degSymbol: '°C',
      desc: "Sunny",
      hi: 30,
      lo: 18,
      feel: 27,
      wind: "3 m/s",
      icon: "☀️",
      hourly: [
        {t:"Now", temp:26, icon:"☀️"},
        {t:"10", temp:29, icon:"☀️"},
        {t:"11", temp:31, icon:"☀️"},
        {t:"12", temp:33, icon:"☀️"},
        {t:"13", temp:32, icon:"☀️"},
        {t:"14", temp:30, icon:"⛅"}
      ]
    };

    const el = {
      cityName: document.getElementById('cityName'),
      temp: document.getElementById('temp'),
      desc: document.getElementById('desc'),
      hiLo: document.getElementById('hiLo'),
      thumb: document.getElementById('thumb'),
      feel: document.getElementById('feel'),
      hours: document.getElementById('hours'),
      spark: document.getElementById('spark'),
      note: document.getElementById('note')
    };

    function render(data){
      el.cityName.textContent = data.city;
      el.temp.innerHTML = `${data.temp}<span class="deg">${data.degSymbol || '°'}</span>`;
      el.desc.textContent = data.desc;
      el.hiLo.textContent = `H: ${data.hi}  L: ${data.lo}`;
      el.thumb.textContent = data.icon;
      el.feel.textContent = `Feels ${data.feel}°`;
      el.note.textContent = `${data.desc} conditions will continue all day.`;
      // hourly
      el.hours.innerHTML = '';
      data.hourly.forEach(h => {
        const d = document.createElement('div');
        d.className = 'hour';
        d.innerHTML = `<div class="time">${h.t}</div><div class="icon">${h.icon}</div><div class="t">${h.temp}°</div>`;
        el.hours.appendChild(d);
      });
      drawSparkline(data.hourly.map(h => h.temp));
    }

    function drawSparkline(values){
      const svg = el.spark;
      const w = 360, h = 90;
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      svg.innerHTML = '';
      if(!values || values.length === 0) return;
      // scale
      const min = Math.min(...values) - 1;
      const max = Math.max(...values) + 1;
      const len = values.length;
      const step = w / Math.max(1, len - 1);
      const points = values.map((v,i) => {
        const x = i * step;
        const y = h - ((v - min) / (max - min)) * h;
        return [x, y];
      });
      // path
      const pathD = points.map((p,i) => `${i===0?'M':'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
      const poly = document.createElementNS('http://www.w3.org/2000/svg','path');
      poly.setAttribute('d', pathD);
      poly.setAttribute('fill','none');
      poly.setAttribute('stroke','#ff8a00');
      poly.setAttribute('stroke-width','3');
      poly.setAttribute('stroke-linecap','round');
      poly.setAttribute('stroke-linejoin','round');
      svg.appendChild(poly);
      // area fill
      const areaD = pathD + ` L ${w} ${h} L 0 ${h} Z`;
      const area = document.createElementNS('http://www.w3.org/2000/svg','path');
      area.setAttribute('d', areaD);
      area.setAttribute('fill','rgba(255,140,0,0.12)');
      svg.insertBefore(area, poly);
    }

    async function fetchAndRender(city){
      if(!apiKey || apiKey === "YOUR_API_KEY"){
        render(demoData);
        return;
      }
      try {
        const cur = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`)
                          .then(r=>{ if(!r.ok) throw r; return r.json();});
        const cityName = cur.name || city;
        const data = {
          city: cityName,
          temp: Math.round(cur.main.temp),
          degSymbol: '°C',
          desc: cur.weather?.[0]?.main || '',
          hi: Math.round(cur.main.temp_max),
          lo: Math.round(cur.main.temp_min),
          feel: Math.round(cur.main.feels_like),
          wind: `${cur.wind?.speed || 0} m/s`,
          icon: mapIcon(cur.weather?.[0]?.main),
          hourly: []
        };
        // get forecast
        const f = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`).then(r=>r.json());
        const list = (f.list || []).slice(0,6);
        if(list.length){
          data.hourly = list.map((it,i)=>{
            const dt = new Date(it.dt*1000);
            const hr = dt.getHours();
            const label = i===0 ? 'Now' : `${hr}` ;
            return { t:label, temp: Math.round(it.main.temp), icon: mapIcon(it.weather?.[0]?.main) };
          });
        } else {
          data.hourly = demoData.hourly;
        }
        render(data);
      } catch(e){
        console.error(e);
        render(demoData);
      }
    }

    function mapIcon(main){
      if(!main) return '☀️';
      const m = String(main).toLowerCase();
      if(m.includes('cloud')) return '⛅';
      if(m.includes('rain')||m.includes('drizzle')) return '🌧️';
      if(m.includes('snow')) return '❄️';
      if(m.includes('thunder')) return '⛈️';
      return '☀️';
    }

    // default: render demo look so the page matches the image immediately.
    fetchAndRender('Sacramento');

    // optional: expose fetchAndRender to console for quick testing:
    window.fetchAndRender = fetchAndRender;
  </script>
</body>
</html>
