<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Weather — Styled</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-sky: linear-gradient(180deg,#bfe9ff 0%, #8fc7ff 30%, #6aa6e6 60%, #3b66b0 100%);
      --glass: rgba(255,255,255,0.06);
      --card-blue: rgba(24,119,206,0.95);
      --white-60: rgba(255,255,255,0.85);
    }

    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
    body{
      background: url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b?q=80&w=1920&auto=format&fit=crop&ixlib=rb-4.0.3&s=7b8f5c7c6a0c2a7a2b1c9e6a1b4f6f2b') center/cover no-repeat, var(--bg-sky);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background-attachment: fixed;
      color:var(--white-60);
    }

    /* phone mock */
    .phone {
      width: 420px;
      max-width:92vw;
      aspect-ratio: 9/19;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.35));
      border-radius: 36px;
      box-shadow: 0 30px 80px rgba(10,20,40,0.5);
      border: 8px solid rgba(0,0,0,0.45);
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px 20px;
      box-sizing:border-box;
    }

    /* subtle edge bezel */
    .phone::before{
      content:'';
      position:absolute;inset:0;border-radius:36px;padding:1px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.25));
      -webkit-mask: linear-gradient(#fff 0 0);
      pointer-events:none;
    }

    /* lens flare / sun */
    .sun {
      position:absolute;
      top:36px;
      left:44%;
      width:120px;height:120px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0 8%, rgba(255,255,255,0.5) 9% 16%, rgba(255,255,255,0.05) 60%, transparent 100%);
      filter: blur(6px);
      transform:translateX(-50%);
      mix-blend-mode:screen;
      pointer-events:none;
    }

    /* content column */
    .screen {
      width:100%;
      max-width:360px;
      text-align:center;
      margin-top:36px;
      z-index:2;
    }

    .top-bar {
      display:flex;
      justify-content:space-between;
      color:rgba(255,255,255,0.9);
      font-weight:500;
      font-size:15px;
      padding:6px 10px;
      opacity:0.95;
    }

    .city {
      font-size:28px;
      margin-top:46px;
      color:#fff;
      font-weight:600;
      text-shadow: 0 8px 20px rgba(10,20,40,0.6);
    }

    .temp {
      font-size:110px;
      line-height:0.85;
      font-weight:300;
      color: #fff;
      margin:6px 0 0 0;
      text-shadow: 0 14px 30px rgba(10,20,40,0.6);
      letter-spacing: -2px;
    }
    .temp .deg { font-size:42px; vertical-align:top; margin-left:6px; opacity:0.95; }

    .desc {
      color:rgba(255,255,255,0.9);
      font-size:15px;
      margin-top:8px;
      opacity:0.95;
    }

    .hi-lo{
      color:rgba(255,255,255,0.85);
      margin-top:6px;
      font-size:13px;
      opacity:0.9;
    }

    /* hourly card */
    .hour-card {
      width:88%;
      margin:28px auto 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
      border-radius:18px;
      padding:18px;
      box-sizing:border-box;
      backdrop-filter: blur(8px) saturate(130%);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 10px 30px rgba(10,20,40,0.35);
      color: #fff;
      text-align:left;
      position:relative;
    }

    .hour-card .hint {
      font-size:14px;
      margin-bottom:12px;
      color:rgba(255,255,255,0.92);
      font-weight:600;
    }

    .hours {
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding-bottom:6px;
      -webkit-overflow-scrolling:touch;
    }
    .hour {
      min-width:56px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:10px 8px;
      text-align:center;
      color:#fff;
      font-size:13px;
      box-shadow: inset 0 -6px 12px rgba(0,0,0,0.08);
    }
    .hour .time { font-weight:700; opacity:0.95; margin-bottom:6px; display:block; font-size:13px;}
    .hour .icon { font-size:18px; margin-bottom:6px; display:block; }
    .hour .t { font-weight:700; font-size:15px; }

    /* input row (hidden in final look but available) */
    .controls {
      display:flex;
      gap:8px;
      justify-content:center;
      margin-top:18px;
    }
    input[type="text"]{
      border-radius:999px;
      padding:10px 14px;
      border:none;
      background:rgba(255,255,255,0.06);
      color:#fff;
      outline: none;
      width:180px;
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.2);
    }
    button.cta {
      padding:10px 14px;border-radius:999px;border:none;background:#fff;color:#0c2340;font-weight:700;cursor:pointer;
    }

    /* small responsiveness */
    @media (max-width:420px){
      .temp { font-size:88px; }
      .city{font-size:22px}
      .phone{padding:20px}
      .hour-card{width:92%}
    }
  </style>
</head>
<body>
  <div class="phone" role="region" aria-label="weather phone mockup">
    <div class="sun" aria-hidden="true"></div>

    <div class="screen">
      <div class="top-bar">
        <div>Cancel</div>
        <div style="font-weight:800">Add</div>
      </div>

      <div id="content">
        <div class="city" id="cityName">—</div>
        <div class="temp" id="temp">—<span class="deg">°</span></div>
        <div class="desc" id="desc">Enter a city below</div>
        <div class="hi-lo" id="hilo"></div>

        <div class="hour-card" aria-live="polite">
          <div class="hint">Sunny conditions will continue all day.</div>
          <div class="hours" id="hours">
            <!-- hourly items will be injected here -->
            <div class="hour"><span class="time">Now</span><span class="icon">☀️</span><span class="t" id="nowTemp">—°</span></div>
          </div>
        </div>

        <div class="controls">
          <input id="cityInput" type="text" placeholder="Enter city name" aria-label="city name">
          <button class="cta" id="getBtn">Get</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Replace with your OpenWeatherMap API key
    const apiKey = "YOUR_API_KEY";
    const getBtn = document.getElementById('getBtn');
    const cityInput = document.getElementById('cityInput');
    const cityName = document.getElementById('cityName');
    const tempEl = document.getElementById('temp');
    const descEl = document.getElementById('desc');
    const hiloEl = document.getElementById('hilo');
    const hoursEl = document.getElementById('hours');
    const nowTemp = document.getElementById('nowTemp');

    getBtn.addEventListener('click', () => fetchWeather(cityInput.value.trim()));
    cityInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') fetchWeather(cityInput.value.trim()); });

    async function fetchWeather(city) {
      if(!city) { cityName.textContent = 'Please enter a city'; return; }
      cityName.textContent = 'Loading...';
      try {
        // Current weather (imperial: °F, change units if you prefer °C)
        const cur = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=imperial&appid=${apiKey}`)
                          .then(r => { if(!r.ok) throw r; return r.json(); });

        cityName.textContent = cur.name;
        tempEl.innerHTML = Math.round(cur.main.temp) + '<span class="deg">°</span>';
        descEl.textContent = cur.weather[0].description.replace(/\b\w/g, c => c.toUpperCase());
        hiloEl.textContent = `H:${Math.round(cur.main.temp_max)}°  L:${Math.round(cur.main.temp_min)}°`;
        nowTemp.textContent = Math.round(cur.main.temp) + '°';

        // Hourly forecast (use forecast endpoint -> 3-hour chunks)
        const f = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=imperial&appid=${apiKey}`)
                        .then(r => r.json());

        // Build simple hourly list (next 6 items)
        const list = f.list ? f.list.slice(0, 6) : [];
        hoursEl.innerHTML = '';
        // add "Now" block
        hoursEl.appendChild(hourNode('Now', '☀️', Math.round(cur.main.temp)));
        list.forEach(item => {
          const dt = new Date(item.dt * 1000);
          const hrs = dt.getHours();
          const timeLabel = (hrs % 12 === 0 ? 12 : hrs % 12) + (hrs < 12 ? ' AM' : ' PM');
          const icon = mapIcon(item.weather[0].main);
          hoursEl.appendChild(hourNode(timeLabel, icon, Math.round(item.main.temp)));
        });

      } catch (err) {
        console.error(err);
        cityName.textContent = 'City not found';
        tempEl.innerHTML = '—<span class="deg">°</span>';
        descEl.textContent = '';
        hiloEl.textContent = '';
        hoursEl.innerHTML = '<div class="hour"><span class="time">—</span><span class="icon">—</span><span class="t">—</span></div>';
      }
    }

    function hourNode(time, icon, temp){
      const d = document.createElement('div');
      d.className = 'hour';
      d.innerHTML = `<span class="time">${time}</span><span class="icon">${icon}</span><span class="t">${temp}°</span>`;
      return d;
    }

    function mapIcon(main){
      if(!main) return '☀️';
      const m = main.toLowerCase();
      if(m.includes('cloud')) return '⛅';
      if(m.includes('rain')||m.includes('drizzle')) return '🌧️';
      if(m.includes('snow')) return '❄️';
      if(m.includes('thunder')) return '⛈️';
      return '☀️';
    }

    // Optional: quick demo default city
    // fetchWeather('Sacramento');
  </script>
</body>
</html>
